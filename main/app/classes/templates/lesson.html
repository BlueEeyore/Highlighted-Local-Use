{% extends "layout.html" %}

{% block content %}

<div class="row">
    <video width="240" height="240" controls>
        <source src="{{url_for('static', filename='files/' + results['videofn'])}}" type="{{results['mime_type']}}">
    </video>
</div>

<div class="row">
    <div id="text-container">
        <p>
            {% for segment in results["transcripts"] %}
                <span class="transcript-segment">{{segment.text}}</span>
            {% endfor %}
        </p>
    </div>

    <!-- This is the pop-up menu. It's hidden by default with CSS. -->
    <div id="highlight-menu">
        <button id="highlight-btn">Highlight</button>
        <!-- add more options here like "comment" etc -->
    </div>

<!-- <div id='annotation-list'></div> -->

</div>


{% endblock %}

{% block scripts %}
<script>
    // Pass the highlights data from Flask/Jinja2 into a JavaScript variable
    // The `|tojson` filter is crucial for safely embedding the data.
    const savedHighlights = {{ results.highlights|tojson }};
    const currentURL = window.location.pathname; // This will be "/classes/<cid>/<lid>"
</script>

<script src="{{ url_for('static', filename='js/highlighter.js') }}"></script>

{% endblock %}
