<!-- Logo Option 1: The Highlighter -->
<svg width="200" height="40" xmlns="http://www.w3.org/2000/svg">
    <!-- The highlighter stroke -->
    <rect x="131" y="8" width="40" height="24" fill="#E94A64" fill-opacity="0.8" rx="3" />

    <!-- The text "HighlightEd" -->
    <text x="10" y="30"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
          font-size="28"
          font-weight="600"
          fill="#403D39">
        Highlight<tspan font-weight="700">Ed</tspan>
    </text>
</svg>