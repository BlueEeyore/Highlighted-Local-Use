{% extends "layout.html" %}
{% block content %}

<div class="page-container">

    <div class="content-wrapper" style="max-width: 650px; text-align: center;">

        <!-- large 404 number -->
        <h1 style="font-size: 6rem; font-weight: 700; color: #e9ecef; margin-bottom: 0;">
            404
        </h1>

        <h2 class="page-title" style="margin-bottom: 1rem;">
            Page Not Found
        </h2>

        <!--  friendly message for the user -->
        <p class="blurb-text" style="margin-bottom: 2.5rem;">
            Sorry, we couldn't find the page you were looking for. It might have been moved, deleted, or you may have typed the address incorrectly.
        </p>

    </div><!-- End of content-wrapper -->

</div><!-- End of page-container -->

{% endblock %}
