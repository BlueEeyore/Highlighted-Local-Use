<!-- Logo Option 1: The Highlighter (with Parallelogram) -->
<svg width="200" height="40" xmlns="http://www.w3.org/2000/svg">

    <!-- The highlighter stroke, now a polygon for the slanted shape -->
    <!-- Format is "x1,y1 x2,y2 x3,y3 x4,y4" (top-left, top-right, bottom-right, bottom-left) -->
    <polygon points="141,6 168,6 158,34 131,34"
             fill="#E94A64" fill-opacity="0.8" />

    <!-- The text "HighlightEd" -->
    <text x="10" y="30"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
          font-size="28"
          font-weight="600"
          fill="#403D39">
        Highlight<tspan font-weight="700">Ed</tspan>
    </text>
</svg>